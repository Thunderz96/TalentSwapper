name: Scrape Archon Builds

on:
  schedule:
    # Daily at 6:17 AM UTC (~2:17 AM EDT / 1:17 AM CDT)
    - cron: '17 6 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape_builds.py --all

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet TalentSwapper_Recommended.lua; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add TalentSwapper_Recommended.lua
          git commit -m "Daily scrape: update recommended builds from Archon.gg"
          git push
